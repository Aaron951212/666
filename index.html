<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MediaPipe 表情辨識</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #111827; color: #f8fafc; }
    .container { max-width: 900px; margin: 0 auto; padding: 16px; }
    h1 { margin-bottom: 12px; font-size: clamp(1.8rem, 3vw, 2.6rem); text-align: center; }
    .controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 14px; }
    button, input[type="button"] { border: none; border-radius: 12px; padding: 12px 18px; background: #2563eb; color: white; font-size: 1rem; cursor: pointer; transition: transform .12s ease, background .12s ease; }
    button:hover, input[type="button"]:hover { background: #1d4ed8; transform: translateY(-1px); }
    button:disabled, input[type="button"]:disabled { opacity: 0.5; cursor: default; }
    input[type="file"] { color: #f8fafc; }
    .video-wrapper { position: relative; width: 100%; aspect-ratio: 16 / 12; max-height: 75vh; background: #0f172a; border-radius: 18px; overflow: hidden; }
    video, canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .status { margin-top: 14px; padding: 16px; border-radius: 18px; background: rgba(15, 23, 42, 0.92); box-shadow: 0 10px 30px rgba(15, 23, 42, 0.45); }
    .status p { margin: 8px 0; line-height: 1.6; }
    .status #expression { font-size: 1.15rem; font-weight: 600; }
    @media (max-width: 640px) { .controls { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>MediaPipe 表情辨識</h1>
    <div class="controls">
      <button id="start-camera">開始相機</button>
      <button id="stop-camera" disabled>停止相機</button>
      <input id="switch-camera" type="button" value="切換鏡頭" disabled />
      <input id="upload-file" type="file" accept="image/*,video/*" />
    </div>
    <div class="video-wrapper">
      <video id="input_video" autoplay muted playsinline></video>
      <canvas id="output_canvas"></canvas>
    </div>
    <div class="status">
      <p id="status">請按「開始相機」以啟動手機攝影機，或上傳圖片/影片進行偵測。</p>
      <p id="expression">目前表情：等待中</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="./script.js"></script>
</body>
</html>
